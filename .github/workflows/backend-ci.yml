name: Backend CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carequeue_user
          POSTGRES_PASSWORD: carequeue_pass
          POSTGRES_DB: carequeue_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://carequeue_user:carequeue_pass@localhost:5432/carequeue_test
          JWT_SECRET: ci-test-jwt-secret
          SECRET_KEY: ci-test-secret
          FLASK_ENV: testing
        run: pytest tests/ -v --tb=short

      - name: Docker build check
        run: docker build -t carequeue-backend:test ./backend
