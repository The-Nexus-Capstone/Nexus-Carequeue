name: Security Scan

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  secret-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
