name: Deploy to Render

on:
  push:
    branches: [develop]

jobs:
  run-backend-ci:
    name: Backend CI (gate)
    uses: ./.github/workflows/backend-ci.yml

  run-frontend-ci:
    name: Frontend CI (gate)
    uses: ./.github/workflows/frontend-ci.yml

  deploy-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs: [run-backend-ci, run-frontend-ci]
    steps:
      - name: Trigger Render frontend deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [run-backend-ci, run-frontend-ci]
    steps:
      - name: Trigger Render backend deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
