services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: carequeue-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

 backend:
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql://carequeue:carequeue@db:5432/carequeue}
  ports:
    - "8000:8000"
  volumes:
    - ./backend:/app
  depends_on:
    - db

  db:
    image: postgres:16
    container_name: carequeue-db
    environment:
      POSTGRES_USER: carequeue
      POSTGRES_PASSWORD: carequeue
      POSTGRES_DB: carequeue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
