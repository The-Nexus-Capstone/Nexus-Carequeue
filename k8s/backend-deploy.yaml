apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: carequeue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: carequeue-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://carequeue_user:carequeue_pass@postgres:5432/carequeue"
        - name: AI_SERVICE_URL
          value: "http://ai-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: carequeue
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
